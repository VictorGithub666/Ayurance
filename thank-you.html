<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - AYU Panchkarma</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #faf6f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .thank-you-card { background: #fff; padding: 48px; border-radius: 24px; text-align: center; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
    .thank-you-card h1 { color: #1e2b1c; font-family: 'Cormorant Garamond', serif; }
    .thank-you-card .icon { font-size: 4rem; color: #83cd2a; }
  </style>
</head>
<body>
  <div class="thank-you-card">
    <div class="icon">✓</div>
    <h1>Thank You!</h1>
    <p style="color: #4a5a47; font-size: 1.1rem;">Your message has been received. We'll get back to you within 24 hours.</p>
    <a href="/" class="btn btn-primary-ayu" style="background: #f4801f; color: #fff; padding: 12px 40px; border-radius: 60px; border: none; font-weight: 600; text-decoration: none; display: inline-block; margin-top: 20px;">Return to Home</a>
  </div>
</body>
</html>
